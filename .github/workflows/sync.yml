name: Sync VPN servers

# Runs the tester worker on a schedule instead of an always-on server.
# CI runners are allowed to do outbound network testing, so this avoids the
# "suspicious activity" flags that free PaaS hosts raise for proxy/VPN probing.
on:
  schedule:
    - cron: '*/30 * * * *' # every 30 minutes (GitHub's minimum is ~5 min)
  workflow_dispatch: {} # lets the admin run it manually from the Actions tab

# Avoid overlapping runs
concurrency:
  group: server-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install worker dependencies
        working-directory: worker
        run: npm ci

      - name: Run sync (test servers → Supabase)
        working-directory: worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # the auto-provided token raises the GitHub API rate limit for repo scraping
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node src/run-once.js

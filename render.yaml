# Render Blueprint for GalaxyVPN.
# Assumes this `galaxyvpn/` folder is the repo root pushed to GitHub.
services:
  # --- Next.js web app ---
  - type: web
    name: galaxyvpn-web
    runtime: node
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: WORKER_TRIGGER_URL
        sync: false
      - key: WORKER_TRIGGER_SECRET
        sync: false

  # --- Tester worker ---
  # Deployed as a `web` service (not `worker`) so it runs on Render's free tier.
  # It serves /health + /trigger-sync and runs the sync on an internal cron.
  # NOTE: free web services sleep after ~15 min idle, pausing the internal cron.
  # To keep syncing 24/7, either upgrade this service, or ping /trigger-sync from
  # an external scheduler (e.g. cron-job.org) — that both wakes it and syncs.
  - type: web
    name: galaxyvpn-worker
    runtime: docker
    rootDir: worker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: WORKER_TRIGGER_SECRET
        sync: false
      - key: SYNC_CRON
        value: "*/20 * * * *"

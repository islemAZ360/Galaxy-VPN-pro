<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="100%" height="400">
  <defs>
    <!-- Dark deep space background -->
    <linearGradient id="spaceBg" x1="0" y1="0" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>

    <!-- Extreme Blur for Aurora -->
    <filter id="auroraBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60" result="blur"/>
    </filter>
    
    <!-- Blur for stars -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="400" fill="url(#spaceBg)"/>

  <!-- Moving Aurora Orbs -->
  <g filter="url(#auroraBlur)" opacity="0.6">
    <circle cx="200" cy="100" r="150" fill="#7C3AED">
      <animate attributeName="cx" values="200; 400; 200" dur="15s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="100; 300; 100" dur="20s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="300" r="180" fill="#2563EB">
      <animate attributeName="cx" values="800; 500; 800" dur="18s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="300; 100; 300" dur="22s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="200" r="120" fill="#EC4899">
      <animate attributeName="cx" values="500; 800; 200; 500" dur="25s" repeatCount="indefinite"/>
      <animate attributeName="r" values="120; 200; 120" dur="15s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Glowing Stars Background -->
  <g fill="#ffffff">
    <!-- Static tiny stars -->
    <circle cx="150" cy="80" r="1" opacity="0.5"/>
    <circle cx="850" cy="120" r="1.5" opacity="0.3"/>
    <circle cx="350" cy="320" r="1" opacity="0.6"/>
    <circle cx="950" cy="250" r="1" opacity="0.4"/>
    
    <!-- Twinkling stars -->
    <circle cx="100" cy="200" r="2" filter="url(#glow)">
      <animate attributeName="opacity" values="0.1;1;0.1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="80" r="2.5" filter="url(#glow)">
      <animate attributeName="opacity" values="0;1;0" dur="5s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="500" cy="350" r="2" filter="url(#glow)">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="4s" repeatCount="indefinite" begin="2s"/>
    </circle>
    <circle cx="300" cy="150" r="3" filter="url(#glow)">
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
  </g>

  <!-- Central Element: Glassmorphism Card -->
  <!-- A subtle glass card in the center -->
  <g transform="translate(250, 100)">
    <rect width="500" height="200" rx="20" fill="rgba(255, 255, 255, 0.03)" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1.5"/>
    <!-- Glow behind text -->
    <circle cx="250" cy="100" r="100" fill="#ffffff" opacity="0.05" filter="url(#auroraBlur)"/>
    
    <!-- Typography -->
    <text x="250" y="85" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="52" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="6">
      GALAXY VPN
    </text>
    
    <!-- Elegant animated gradient text for "PRO" -->
    <linearGradient id="proGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A855F7">
        <animate attributeName="stop-color" values="#A855F7;#3B82F6;#EC4899;#A855F7" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#EC4899">
        <animate attributeName="stop-color" values="#EC4899;#A855F7;#3B82F6;#EC4899" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    
    <text x="250" y="140" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="800" fill="url(#proGradient)" text-anchor="middle" letter-spacing="10">
      PRO EDITION
    </text>
  </g>

  <!-- Shooting Star -->
  <g transform="rotate(-30 500 200)">
    <line x1="-200" y1="200" x2="-100" y2="200" stroke="url(#proGradient)" stroke-width="2" filter="url(#glow)">
      <animate attributeName="x1" values="-200; 1200" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="-100; 1300" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite"/>
    </line>
  </g>
</svg>

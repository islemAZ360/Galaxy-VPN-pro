<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 20" width="100%" height="20">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <line x1="0" y1="10" x2="1000" y2="10" stroke="#112233" stroke-width="2"/>
  
  <line x1="0" y1="10" x2="200" y2="10" stroke="#00ffcc" stroke-width="4" filter="url(#glow)">
    <animate attributeName="x1" values="-200; 1000" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="0; 1200" dur="2s" repeatCount="indefinite"/>
  </line>
  
  <line x1="1000" y1="10" x2="800" y2="10" stroke="#ff00ff" stroke-width="4" filter="url(#glow)">
    <animate attributeName="x1" values="1200; -200" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="1000; -400" dur="2.5s" repeatCount="indefinite"/>
  </line>
</svg>

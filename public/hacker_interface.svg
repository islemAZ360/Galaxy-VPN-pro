<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="100%" height="300">
  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0" y1="0" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000" />
      <stop offset="100%" stop-color="#0d1117" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38B2AC" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    <filter id="neonBlur">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1000" height="300" fill="url(#bg)"/>
  <rect width="1000" height="300" fill="url(#glow)"/>

  <!-- Left Side: Radar / Globe -->
  <g transform="translate(200, 150)">
    <circle cx="0" cy="0" r="120" fill="none" stroke="#38B2AC" stroke-width="1.5" stroke-dasharray="2 4" opacity="0.3"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#38B2AC" stroke-width="1" opacity="0.2"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#38B2AC" stroke-width="0.5" opacity="0.1"/>
    
    <path d="M -120 0 L 120 0 M 0 -120 L 0 120" stroke="#38B2AC" stroke-width="1" opacity="0.15"/>
    
    <!-- Rotating Scanner -->
    <path d="M 0 0 L 0 -120 A 120 120 0 0 1 120 0 Z" fill="#38B2AC" opacity="0.1">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
    </path>
    <line x1="0" y1="0" x2="0" y2="-120" stroke="#38B2AC" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
    </line>

    <!-- Blips -->
    <circle cx="45" cy="-60" r="4" fill="#3ECF8E" filter="url(#neonBlur)">
      <animate attributeName="opacity" values="0;1;0;0;0" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-70" cy="-30" r="3" fill="#3ECF8E" filter="url(#neonBlur)">
      <animate attributeName="opacity" values="0;0;0;1;0" dur="4s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="-20" cy="80" r="5" fill="#38B2AC" filter="url(#neonBlur)">
      <animate attributeName="opacity" values="0;0;0;0;1" dur="4s" repeatCount="indefinite" begin="2s"/>
    </circle>
    
    <!-- Central pulse -->
    <circle cx="0" cy="0" r="5" fill="#ffffff" filter="url(#neonBlur)">
      <animate attributeName="r" values="5;15;5" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Right Side: Terminal -->
  <g transform="translate(420, 40)">
    <rect x="0" y="0" width="500" height="220" rx="8" fill="#0A0A0A" stroke="#1F2937" stroke-width="2"/>
    <circle cx="20" cy="20" r="5" fill="#EF4444"/>
    <circle cx="40" cy="20" r="5" fill="#F59E0B"/>
    <circle cx="60" cy="20" r="5" fill="#10B981"/>
    
    <g font-family="'Courier New', monospace" font-size="13" fill="#38B2AC" opacity="0.9">
      <clipPath id="termClip"><rect x="20" y="40" width="460" height="160"/></clipPath>
      <g clip-path="url(#termClip)">
        <text x="20" y="60">
          <animate attributeName="y" values="60; -100" dur="8s" repeatCount="indefinite"/>
          <tspan x="20" dy="1.6em" fill="#9CA3AF">➜  ~ ./galaxy-core --init</tspan>
          <tspan x="20" dy="1.6em" fill="#10B981">✓ Connected to Supabase Cluster</tspan>
          <tspan x="20" dy="1.6em" fill="#3B82F6">ℹ Syncing 42 remote nodes...</tspan>
          <tspan x="20" dy="1.6em" fill="#10B981">✓ Bypass DPI Handshake: OK</tspan>
          <tspan x="20" dy="1.6em" fill="#F59E0B">⚠ Latency spike detected on Node-7</tspan>
          <tspan x="20" dy="1.6em" fill="#10B981">✓ Traffic rerouted successfully.</tspan>
          <tspan x="20" dy="1.6em" fill="#9CA3AF">➜  ~ Securing connection (AES-256-GCM)</tspan>
          <tspan x="20" dy="1.6em" fill="#3B82F6">ℹ Awaiting next polling cycle...</tspan>
          
          <tspan x="20" dy="3.2em" fill="#9CA3AF">➜  ~ ./galaxy-core --init</tspan>
          <tspan x="20" dy="1.6em" fill="#10B981">✓ Connected to Supabase Cluster</tspan>
          <tspan x="20" dy="1.6em" fill="#3B82F6">ℹ Syncing 42 remote nodes...</tspan>
        </text>
      </g>
    </g>
  </g>
  
  <text x="500" y="280" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="600" fill="#9CA3AF" text-anchor="middle" letter-spacing="4">
    GALAXY SYSTEM STATUS: <tspan fill="#10B981">OPTIMAL</tspan>
  </text>
</svg>

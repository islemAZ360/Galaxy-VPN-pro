<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 350" width="100%" height="350">
  <defs>
    <!-- Core Glow Gradient -->
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="20%" stop-color="#8a2be2" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#4b0082" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>

    <!-- Ring Gradients -->
    <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff00ff" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="ring2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff00ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00ffff" stop-opacity="0.1"/>
    </linearGradient>

    <!-- Drop Shadow for Text -->
    <filter id="neonShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="lightGlow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Deep Space Background -->
  <rect width="1000" height="350" fill="#0d1117"/>

  <!-- Pulsing Black Hole / Core -->
  <circle cx="500" cy="175" r="150" fill="url(#coreGlow)">
    <animate attributeName="r" values="120; 160; 120" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
    <animate attributeName="opacity" values="0.7; 1; 0.7" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Twinkling Stars Background -->
  <g fill="#ffffff">
    <circle cx="150" cy="80" r="2"><animate attributeName="opacity" values="0.1;1;0.1" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="850" cy="120" r="3"><animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite" begin="1s"/></circle>
    <circle cx="250" cy="280" r="1.5"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="2s" repeatCount="indefinite" begin="0.5s"/></circle>
    <circle cx="750" cy="260" r="2.5"><animate attributeName="opacity" values="0;1;0" dur="5s" repeatCount="indefinite" begin="2s"/></circle>
    <circle cx="100" cy="200" r="1.5"><animate attributeName="opacity" values="0;0.9;0" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="220" r="2"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="400" cy="50" r="2"><animate attributeName="opacity" values="0;0.7;0" dur="3s" repeatCount="indefinite" begin="1.2s"/></circle>
    <circle cx="600" cy="300" r="2"><animate attributeName="opacity" values="0.1;1;0.1" dur="2.8s" repeatCount="indefinite" begin="0.8s"/></circle>
  </g>

  <!-- Spinning Accretion Disks / Rings -->
  <g fill="none" stroke-width="2">
    <!-- Ring 1 (Cyan to Magenta) -->
    <ellipse cx="500" cy="175" rx="350" ry="80" stroke="url(#ring1)">
      <animateTransform attributeName="transform" type="rotate" from="0 500 175" to="360 500 175" dur="25s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Ring 2 (Magenta to Cyan) -->
    <ellipse cx="500" cy="175" rx="420" ry="60" stroke="url(#ring2)">
      <animateTransform attributeName="transform" type="rotate" from="360 500 175" to="0 500 175" dur="35s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Inner fast ring -->
    <ellipse cx="500" cy="175" rx="200" ry="40" stroke="#00ffff" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="0 500 175" to="-360 500 175" dur="10s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Shooting Stars / Comets -->
  <g fill="#ffffff">
    <circle cx="-50" cy="100" r="2">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="1100 200" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1050" cy="300" r="2">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-1100 -250" dur="6s" repeatCount="indefinite" begin="2s"/>
      <animate attributeName="opacity" values="0;1;0" dur="6s" repeatCount="indefinite" begin="2s"/>
    </circle>
  </g>

  <!-- Main Title -->
  <text x="500" y="160" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="70" font-weight="900" fill="#ffffff" text-anchor="middle" filter="url(#neonShadow)" letter-spacing="8">
    GALAXY VPN
  </text>
  
  <!-- Subtitle with Glowing Animation -->
  <text x="500" y="210" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="20" font-weight="600" fill="#00ffff" text-anchor="middle" letter-spacing="12">
    PRO EDITION
    <animate attributeName="opacity" values="0.4; 1; 0.4" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="fill" values="#00ffff; #ff00ff; #00ffff" dur="4s" repeatCount="indefinite"/>
  </text>
  
  <text x="500" y="245" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-style="italic" fill="#a8b2c1" text-anchor="middle" opacity="0.8">
    BEYOND CENSORSHIP. BEYOND LIMITS.
  </text>

</svg>

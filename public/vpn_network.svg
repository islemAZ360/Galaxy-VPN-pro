<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 250" width="100%" height="250">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1000" height="250" fill="#0d1117"/>

  <!-- Network Lines -->
  <!-- Left to Center -->
  <path d="M 150 125 C 250 125, 350 125, 500 125" fill="none" stroke="#1F2937" stroke-width="2"/>
  
  <!-- Center to Right Nodes -->
  <path d="M 500 125 C 650 125, 750 50, 850 50" fill="none" stroke="#38B2AC" stroke-width="2" opacity="0.4"/>
  <path d="M 500 125 C 650 125, 750 125, 850 125" fill="none" stroke="#3ECF8E" stroke-width="2" opacity="0.6"/>
  <path d="M 500 125 C 650 125, 750 200, 850 200" fill="none" stroke="#38B2AC" stroke-width="2" opacity="0.4"/>

  <!-- Data Packets (Traveling from Center to Right) -->
  <g fill="#ffffff" filter="url(#glow)">
    <!-- Packet 1 -->
    <circle r="4">
      <animateMotion dur="2s" repeatCount="indefinite" path="M 500 125 C 650 125, 750 50, 850 50" keyPoints="0;1" keyTimes="0;1"/>
    </circle>
    <!-- Packet 2 -->
    <circle r="4">
      <animateMotion dur="1.5s" repeatCount="indefinite" path="M 500 125 C 650 125, 750 125, 850 125" keyPoints="0;1" keyTimes="0;1"/>
    </circle>
    <!-- Packet 3 -->
    <circle r="4">
      <animateMotion dur="2.5s" repeatCount="indefinite" path="M 500 125 C 650 125, 750 200, 850 200" keyPoints="0;1" keyTimes="0;1"/>
    </circle>
    <!-- User packet -->
    <circle r="4" fill="#3B82F6">
      <animateMotion dur="1s" repeatCount="indefinite" path="M 150 125 C 250 125, 350 125, 500 125" keyPoints="0;1" keyTimes="0;1"/>
    </circle>
  </g>

  <!-- Nodes -->
  <!-- Left Node: User -->
  <circle cx="150" cy="125" r="20" fill="#0A0A0A" stroke="#3B82F6" stroke-width="3" filter="url(#glow)"/>
  <text x="150" y="129" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">CLIENT</text>

  <!-- Center Node: Next.js + Supabase Core -->
  <circle cx="500" cy="125" r="30" fill="#0A0A0A" stroke="#10B981" stroke-width="4" filter="url(#glow)"/>
  <circle cx="500" cy="125" r="10" fill="#38B2AC">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="r" values="10;20;10" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="500" y="185" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" fill="#10B981" text-anchor="middle" filter="url(#glow)">GALAXY CORE</text>

  <!-- Right Nodes: VPN Servers -->
  <!-- Node Alpha -->
  <circle cx="850" cy="50" r="15" fill="#0A0A0A" stroke="#38B2AC" stroke-width="2" filter="url(#glow)"/>
  <text x="850" y="54" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">N1</text>
  <text x="900" y="54" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#9CA3AF" text-anchor="start">EU_WEST</text>

  <!-- Node Beta -->
  <circle cx="850" cy="125" r="15" fill="#0A0A0A" stroke="#10B981" stroke-width="2" filter="url(#glow)"/>
  <text x="850" y="129" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">N2</text>
  <text x="900" y="129" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#10B981" text-anchor="start">US_EAST</text>

  <!-- Node Gamma -->
  <circle cx="850" cy="200" r="15" fill="#0A0A0A" stroke="#38B2AC" stroke-width="2" filter="url(#glow)"/>
  <text x="850" y="204" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">N3</text>
  <text x="900" y="204" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#9CA3AF" text-anchor="start">ASIA_PAC</text>

</svg>

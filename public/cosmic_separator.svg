<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 20" width="100%" height="20">
  <defs>
    <linearGradient id="sepGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background line -->
  <rect x="0" y="9" width="1000" height="2" fill="url(#sepGrad)" opacity="0.5"/>
  <!-- Glowing moving part -->
  <ellipse cx="0" cy="10" rx="100" ry="2" fill="#EC4899" filter="url(#glow)">
    <animate attributeName="cx" values="-100; 1100; -100" dur="6s" repeatCount="indefinite"/>
  </ellipse>
</svg>
